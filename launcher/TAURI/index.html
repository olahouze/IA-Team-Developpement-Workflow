<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windmill Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <div class="container">
    <h1>Windmill Launcher</h1>

    <div class="status-grid">
      <div class="status-card">
        <div class="status-icon">🐘</div>
        <div class="status-label">PostgreSQL</div>
        <div class="indicator" id="pg-status"></div>
      </div>

      <div class="status-card">
        <div class="status-icon">⚙️</div>
        <div class="status-label">Server</div>
        <div class="indicator" id="server-status"></div>
      </div>

      <div class="status-card">
        <div class="status-icon">⚡</div>
        <div class="status-label">Worker</div>
        <div class="indicator" id="worker-status"></div>
      </div>
      <div class="status-card">
        <div class="status-icon">🌐</div>
        <div class="status-label">URL Accès</div>
        <div class="indicator" id="url-status"></div>
      </div>
    </div>

    <div class="actions" style="display: none;">
      <button id="open-btn" class="primary" disabled>Open Web UI</button>
      <button id="logs-btn" class="secondary">View Logs</button>
    </div>

    <div class="progress-container">
      <label for="startup-progress" id="progress-label">Initialisation...</label>
      <progress id="startup-progress" value="0" max="100"></progress>
    </div>

    <div id="log-section" class="log-section">
      <div class="log-tabs">
        <button class="log-tab-btn active" data-tab="migration-logs">Migration</button>
        <button class="log-tab-btn" data-tab="app-logs">Application</button>
      </div>
      <div id="migration-logs" class="log-viewport"></div>
      <div id="app-logs" class="log-viewport hidden"></div>
    </div>
  </div>
</body>

</html>
